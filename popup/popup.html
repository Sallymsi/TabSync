<!DOCTYPE html>
<html>
  <head>
    <script src="libs/firebase-app-compat.js"></script>
    <script src="libs/firebase-auth-compat.js"></script>
    <script src="libs/firebase-database-compat.js"></script>
    <script src="popup.js"></script>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <div id="auth-container">
        <button id="google-signin" style="background: #4285f4; color: white; padding: 10px; border: none; border-radius: 4px; cursor: pointer;">
          Se connecter avec Google
        </button>
        <div id="manual-uid-container" style="margin-top: 10px; display: none;">
          <input type="text" id="manual-uid" placeholder="UID manuel" style="width: 70%; padding: 5px;">
          <button id="use-manual-uid" style="width: 28%; padding: 5px; margin-left: 2%;">Utiliser</button>
        </div>
    </div>
    <div id="app-container" style="display: none;">
      <div>
        <label for="session-select">Session :</label>
        <select id="session-select">
          <option value="travail">Travail</option>
          <option value="loisirs">Loisirs</option>
          <option value="voyage">Voyage</option>
          <option value="autre">Autre</option>
        </select>
      </div>
      <button id="sync-button">Synchroniser mes onglets</button>
      <button id="open-all-remote-tabs">Ouvrir tous les onglets</button>
      <div id="local-tabs"></div>
      <div id="remote-tabs"></div>
    </div>
  </body>
</html>
